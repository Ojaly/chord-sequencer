<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord Melody Sequencer v2</title>
<style>
:root {
  --bg: #12121f; --panel: #1a1a2e; --surface: #16213e;
  --accent: #e94560; --accent2: #533483;
  --text: #eaeaea; --dim: #6a6a8a; --border: #252540;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100%; }

/* HEADER */
#header { background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 6px 12px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
#logo { font-size: 15px; font-weight: 800; color: var(--accent); letter-spacing: 2px; margin-right: 4px; }
.ctrl { display: flex; align-items: center; gap: 5px; }
.ctrl-lbl { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }
input[type=number] { background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 3px 6px; border-radius: 4px; width: 60px; font-size: 12px; }
input[type=number]:focus { outline: 1px solid var(--accent2); }
button { background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all .12s; white-space: nowrap; }
button:hover { background: var(--accent2); border-color: var(--accent2); }
button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
button.primary:hover { filter: brightness(1.15); }
.sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

/* MAIN */
#main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* LEFT PANEL */
#left { width: 230px; background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.sec { padding: 10px; border-bottom: 1px solid var(--border); }
.sec-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 8px; }
#chord-list { display: flex; flex-direction: column; gap: 5px; }

/* Chord row — 1行コンパクトレイアウト */
.chord-row { display: flex; align-items: center; gap: 3px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 5px; padding: 4px 6px;
  flex-wrap: nowrap; min-width: 0; }
.chord-idx { color: var(--accent); font-weight: 700; font-size: 10px; min-width: 12px; flex-shrink: 0; }
.chord-row select { background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 2px 2px; border-radius: 3px; font-size: 11px; cursor: pointer; flex-shrink: 0; }
.chord-row select:focus { outline: 1px solid var(--accent2); }
.root-sel  { width: 40px; }
.type-sel  { width: 50px; }
.beats-grp { display: flex; align-items: center; gap: 2px; flex-shrink: 0; margin-left: auto; }
.beats-sel { width: 30px; color: #7ecfff; font-weight: 700; font-size: 12px; }
.beats-lbl { color: var(--dim); font-size: 10px; white-space: nowrap; }
.del-btn { background: transparent; border: none; color: var(--dim); padding: 0 4px;
  font-size: 14px; cursor: pointer; flex-shrink: 0; border-radius: 3px; }
.del-btn:hover { color: var(--accent); background: transparent; border: none; }
#btn-add { width: 100%; border-style: dashed; margin-top: 5px; }

#btn-gen { width: 100%; background: linear-gradient(135deg, var(--accent2), var(--accent));
  border: none; color: #fff; font-weight: 700; padding: 9px; font-size: 12px; }
#btn-gen:hover { filter: brightness(1.15); }
.hint { color: var(--dim); font-size: 10px; line-height: 1.7; }
.row2 { display: flex; gap: 5px; margin-top: 6px; }
.row2 button { flex: 1; font-size: 10px; }
.exp-btns { display: flex; gap: 5px; }
.exp-btns button { flex: 1; }

/* ROLL */
#roll-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.band-row { display: flex; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.spacer-cell { width: 52px; flex-shrink: 0; border-right: 1px solid var(--border); }
.band-clip { flex: 1; overflow: hidden; position: relative; }
#chord-band-row { height: 26px; }
#timeline-row   { height: 30px; }
#chord-band-row .band-clip { background: #0d1f3a; }
#timeline-row   .band-clip { background: var(--panel); }
#roll-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }
#keys-clip { width: 52px; flex-shrink: 0; overflow: hidden; border-right: 1px solid var(--border); }
#roll-scroll { flex: 1; overflow: auto; }
canvas { display: block; }

/* STATUS */
#status { background: var(--panel); border-top: 1px solid var(--border);
  padding: 3px 12px; display: flex; gap: 16px; align-items: center;
  font-size: 10px; color: var(--dim); flex-shrink: 0; }
#status span { color: var(--text); }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent2); }
select option { background: #1a1a2e; }
</style>
</head>
<body>
<div id="app">

<div id="header">
  <span id="logo">⚡ CHORD SEQ</span>
  <div class="sep"></div>
  <div class="ctrl">
    <span class="ctrl-lbl">BPM</span>
    <input type="number" id="inp-bpm" value="120" min="40" max="240">
  </div>
  <div class="sep"></div>
  <button id="btn-play" class="primary">▶ 再生</button>
  <button id="btn-stop">■ 停止</button>
  <button id="btn-loop" class="on">⟳ Loop</button>
  <div class="sep"></div>
  <button id="btn-wav">⬇ WAV</button>
  <button id="btn-midi">⬇ MIDI</button>
</div>

<div id="main">
  <div id="left">
    <div class="sec">
      <div class="sec-title">コード進行 <span style="color:var(--dim);font-size:9px;font-weight:400;text-transform:none">（拍数は各コードで設定）</span></div>
      <div id="chord-list"></div>
      <button id="btn-add">＋ コード追加</button>
    </div>
    <div class="sec">
      <button id="btn-gen">✨ メロディ自動生成</button>
    </div>
    <div class="sec">
      <div class="sec-title">ピアノロール</div>
      <div class="hint">左クリック：ノート追加<br>ドラッグ：長さ調整<br>右クリック：削除</div>
      <div class="row2">
        <button id="btn-clear">消去</button>
        <button id="btn-quant">量子化</button>
      </div>
    </div>
    <div class="sec">
      <div class="sec-title">書き出し</div>
      <div class="exp-btns">
        <button id="btn-wav2">WAV</button>
        <button id="btn-midi2">MIDI</button>
      </div>
    </div>
  </div>

  <div id="roll-wrap">
    <div class="band-row" id="chord-band-row">
      <div class="spacer-cell"></div>
      <div class="band-clip" id="chord-clip"><canvas id="cv-chord"></canvas></div>
    </div>
    <div class="band-row" id="timeline-row">
      <div class="spacer-cell"></div>
      <div class="band-clip" id="tl-clip"><canvas id="cv-tl"></canvas></div>
    </div>
    <div id="roll-body">
      <div id="keys-clip"><canvas id="cv-keys"></canvas></div>
      <div id="roll-scroll"><canvas id="cv-roll"></canvas></div>
    </div>
  </div>
</div>

<div id="status">
  位置: <span id="s-pos">停止中</span>
  ノート数: <span id="s-notes">0</span>
  コード: <span id="s-chord">—</span>
</div>

</div>
<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const NOTE_NAMES   = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BLACK_KEY_SET = new Set([1,3,6,8,10]);
const CHORD_DEFS = {
  maj:  { iv:[0,4,7],      sc:[0,2,4,5,7,9,11],  label:'Major' },
  min:  { iv:[0,3,7],      sc:[0,2,3,5,7,8,10],  label:'Minor' },
  maj7: { iv:[0,4,7,11],   sc:[0,2,4,5,7,9,11],  label:'Maj7' },
  min7: { iv:[0,3,7,10],   sc:[0,2,3,5,7,8,10],  label:'Min7' },
  dom7: { iv:[0,4,7,10],   sc:[0,2,4,5,7,9,10],  label:'Dom7' },
  dim:  { iv:[0,3,6],      sc:[0,2,3,5,6,8,9],   label:'Dim' },
  aug:  { iv:[0,4,8],      sc:[0,2,4,6,8,10],    label:'Aug' },
  sus2: { iv:[0,2,7],      sc:[0,2,5,7,9],        label:'Sus2' },
  sus4: { iv:[0,5,7],      sc:[0,2,5,7,9],        label:'Sus4' },
  maj6: { iv:[0,4,7,9],    sc:[0,2,4,5,7,9,11],  label:'Maj6' },
  min6: { iv:[0,3,7,9],    sc:[0,2,3,5,7,9,10],  label:'Min6' },
};
const NH  = 12;   // note height px
const SW  = 22;   // step width px
const KW  = 52;   // key width px
const SPB = 4;    // steps per beat (16th notes)
const MIN_MIDI = 36;  // C2
const MAX_MIDI = 83;  // B5
const N_NOTES  = MAX_MIDI - MIN_MIDI + 1; // 48

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  bpm: 120, loop: true, playing: false,
  // beats = 拍数。4拍=1小節(4/4), 3拍=1小節(3/4), など自由に設定
  chords: [
    {root:0, type:'maj', beats:4},
    {root:5, type:'maj', beats:4},
    {root:7, type:'maj', beats:4},
    {root:0, type:'maj', beats:4},
  ],
  notes: [],   // [{step, note(midi), dur}]
  curStep: -1,
};

// ── Chord position helpers ────────────────────────────────────────────────────
function totalSteps() {
  return S.chords.reduce((s, c) => s + c.beats * SPB, 0);
}
function chordStartStep(ci) {
  return S.chords.slice(0, ci).reduce((s, c) => s + c.beats * SPB, 0);
}
function chordIdxAt(step) {
  let acc = 0;
  for (let i = 0; i < S.chords.length; i++) {
    acc += S.chords[i].beats * SPB;
    if (step < acc) return i;
  }
  return S.chords.length - 1;
}
function chordAt(step) { return S.chords[chordIdxAt(step)]; }
function isChordStart(step) {
  let acc = 0;
  for (const ch of S.chords) {
    if (acc === step) return true;
    acc += ch.beats * SPB;
  }
  return false;
}

// ── Audio (Piano synthesis) ───────────────────────────────────────────────────
let AC = null, masterOut = null;

function getAC() {
  if (!AC) {
    AC = new AudioContext();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -8;
    comp.knee.value = 6;
    comp.ratio.value = 4;
    comp.attack.value = 0.002;
    comp.release.value = 0.15;
    comp.connect(AC.destination);
    masterOut = comp;
  }
  return AC;
}

const midi2f = m => 440 * 2 ** ((m - 69) / 12);

// ピアノ音合成：加算合成（基音＋倍音）＋指数減衰エンベロープ
function piano(ctx, dest, freq, t, dur, vol) {
  const decay = Math.min(dur * 0.95, 3.0);
  const mGain = ctx.createGain();
  mGain.gain.value = vol;
  mGain.connect(dest);
  // [倍音, 音量比]
  [[1, 1.0],[2, 0.48],[3, 0.25],[4, 0.12],[5, 0.06]].forEach(([h, a]) => {
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq * h;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(a, t + 0.003);
    g.gain.exponentialRampToValueAtTime(Math.max(a * 0.0001, 1e-5), t + decay);
    osc.connect(g); g.connect(mGain);
    osc.start(t); osc.stop(t + decay + 0.06);
  });
}

// シンセパッド：デチューンドソーツース×2 ＋ ローパスフィルタースイープ
function padVoice(ctx, dest, freq, t, dur, vol, detune) {
  const att = Math.min(0.25, dur * 0.18);
  const rel = Math.min(0.6,  dur * 0.28);
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const filt = ctx.createBiquadFilter();
  const g    = ctx.createGain();
  osc1.type = 'sawtooth'; osc1.frequency.value = freq; osc1.detune.value = -detune;
  osc2.type = 'sawtooth'; osc2.frequency.value = freq; osc2.detune.value =  detune;
  // フィルター：アタック時にゆっくり開く（パッド特有の音）
  filt.type = 'lowpass';
  filt.frequency.setValueAtTime(200,  t);
  filt.frequency.linearRampToValueAtTime(2200, t + att * 2.5);
  filt.frequency.setValueAtTime(1600, Math.max(t + att * 2.5, t + dur - rel));
  filt.Q.value = 1.2;
  // エンベロープ：スローアタック、ロングサステイン、スローリリース
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + att);
  g.gain.setValueAtTime(vol, Math.max(t + att + 0.01, t + dur - rel));
  g.gain.linearRampToValueAtTime(0, t + dur + 0.05);
  osc1.connect(filt); osc2.connect(filt); filt.connect(g); g.connect(dest);
  osc1.start(t); osc1.stop(t + dur + 0.12);
  osc2.start(t); osc2.stop(t + dur + 0.12);
}

function playChordPad(ctx, dest, chord, t, dur) {
  const def = CHORD_DEFS[chord.type];
  const att = Math.min(0.25, dur * 0.18);
  const rel = Math.min(0.6,  dur * 0.28);
  // サイン波ベース（低域を支える）
  const bassOsc = ctx.createOscillator();
  const bassG   = ctx.createGain();
  bassOsc.type = 'sine'; bassOsc.frequency.value = midi2f(chord.root + 36);
  bassG.gain.setValueAtTime(0, t);
  bassG.gain.linearRampToValueAtTime(0.14, t + att);
  bassG.gain.setValueAtTime(0.14, Math.max(t + att + 0.01, t + dur - rel));
  bassG.gain.linearRampToValueAtTime(0, t + dur + 0.05);
  bassOsc.connect(bassG); bassG.connect(dest);
  bassOsc.start(t); bassOsc.stop(t + dur + 0.12);
  // コードトーン（デチューンドパッド ×2レイヤー）
  def.iv.forEach(iv => {
    padVoice(ctx, dest, midi2f(chord.root + iv + 48), t, dur, 0.068, 8);   // octave 3〜4
    padVoice(ctx, dest, midi2f(chord.root + iv + 60), t, dur, 0.022, 12);  // octave 4〜5（薄いシマー）
  });
}

function playMelPiano(ctx, dest, midi, t, dur) {
  piano(ctx, dest, midi2f(midi), t, dur, 0.16);
}

// ── Scheduler ─────────────────────────────────────────────────────────────────
const LOOKAHEAD = 0.12;
const SCHED_MS  = 25;
let schedTimer, nextStep, nextTime;

function stepDur() { return 60 / S.bpm / SPB; }

function schedStep(step, t) {
  const ctx = getAC();
  const sd  = stepDur();
  // コード境界でコード音を鳴らす
  if (isChordStart(step)) {
    const ci  = chordIdxAt(step);
    const ch  = S.chords[ci];
    const dur = ch.beats * SPB * sd;
    playChordPad(ctx, masterOut, ch, t, dur);
  }
  // メロディノート
  S.notes.forEach(n => {
    if (n.step === step) playMelPiano(ctx, masterOut, n.note, t, n.dur * sd);
  });
}

function scheduler() {
  const ctx = getAC();
  const ts  = totalSteps();
  const sd  = stepDur();
  while (nextTime < ctx.currentTime + LOOKAHEAD) {
    const step = nextStep % ts;
    schedStep(step, nextTime);
    const fireAt = (nextTime - ctx.currentTime) * 1000;
    const ss = step;
    setTimeout(() => {
      if (!S.playing) return;
      S.curStep = ss;
      drawRoll(); updateStatus();
      const rs = document.getElementById('roll-scroll');
      const px = ss * SW;
      if (px < rs.scrollLeft || px > rs.scrollLeft + rs.clientWidth - 60)
        rs.scrollLeft = Math.max(0, px - 40);
    }, Math.max(0, fireAt));
    nextStep++;
    nextTime += sd;
    if (!S.loop && nextStep >= ts) {
      setTimeout(stopPlay, Math.max(0, (nextTime - ctx.currentTime) * 1000 + 100));
      return;
    }
  }
  schedTimer = setTimeout(scheduler, SCHED_MS);
}

function startPlay() {
  if (S.playing) return;
  const ctx = getAC();
  if (ctx.state === 'suspended') ctx.resume();
  S.playing = true; nextStep = 0; nextTime = ctx.currentTime + 0.05;
  document.getElementById('btn-play').classList.add('on');
  scheduler();
}
function stopPlay() {
  S.playing = false; S.curStep = -1;
  clearTimeout(schedTimer);
  document.getElementById('btn-play').classList.remove('on');
  drawRoll(); updateStatus();
}

// ── Canvas refs ───────────────────────────────────────────────────────────────
const cvRoll  = document.getElementById('cv-roll');
const cvKeys  = document.getElementById('cv-keys');
const cvTL    = document.getElementById('cv-tl');
const cvChord = document.getElementById('cv-chord');
const cxRoll  = cvRoll.getContext('2d');
const cxKeys  = cvKeys.getContext('2d');
const cxTL    = cvTL.getContext('2d');
const cxChord = cvChord.getContext('2d');

const midiRow = m => MAX_MIDI - m;
const rowMidi = r => MAX_MIDI - r;
const isBlack = m => BLACK_KEY_SET.has(m % 12);

// ── Draw Keys ─────────────────────────────────────────────────────────────────
function drawKeys() {
  const w = KW, h = cvKeys.height;
  cxKeys.fillStyle = '#12121f';
  cxKeys.fillRect(0, 0, w, h);
  for (let row = 0; row < N_NOTES; row++) {
    const midi = rowMidi(row), y = row * NH;
    const bl = isBlack(midi), nm = NOTE_NAMES[midi % 12];
    cxKeys.fillStyle = bl ? '#1e1e34' : (nm === 'C' ? '#2a2a4a' : '#232338');
    cxKeys.fillRect(0, y, w - 1, NH - 1);
    if (bl) { cxKeys.fillStyle = '#0d0d1a'; cxKeys.fillRect(w - 14, y, 13, NH - 1); }
    if (nm === 'C') {
      cxKeys.fillStyle = '#e94560'; cxKeys.font = '8px monospace'; cxKeys.textAlign = 'left';
      cxKeys.fillText('C' + (Math.floor(midi / 12) - 1), 2, y + NH - 3);
    } else if ((nm === 'A' || nm === 'F' || nm === 'E') && !bl) {
      cxKeys.fillStyle = '#555'; cxKeys.font = '8px monospace'; cxKeys.textAlign = 'left';
      cxKeys.fillText(nm, 2, y + NH - 3);
    }
  }
  cxKeys.fillStyle = '#252540'; cxKeys.fillRect(w - 1, 0, 1, h);
}

// ── Draw Timeline ─────────────────────────────────────────────────────────────
function drawTimeline() {
  const w = cvTL.width, h = cvTL.height;
  cxTL.fillStyle = '#1a1a2e'; cxTL.fillRect(0, 0, w, h);

  let beatNum = 1;
  S.chords.forEach((ch, ci) => {
    const startSt = chordStartStep(ci);
    for (let b = 0; b < ch.beats; b++) {
      const x = (startSt + b * SPB) * SW;
      const isFirst = b === 0;
      // Beat tick
      cxTL.fillStyle = isFirst ? '#4a4a7a' : '#252545';
      cxTL.fillRect(x, isFirst ? 0 : h - 12, 1, isFirst ? h : 12);
      // Beat number
      cxTL.fillStyle = isFirst ? '#e94560' : '#666';
      cxTL.font = isFirst ? 'bold 10px monospace' : '9px monospace';
      cxTL.textAlign = 'left';
      cxTL.fillText(String(beatNum), x + 2, h - 4);
      beatNum++;
    }
  });
  // Total end line
  const ex = totalSteps() * SW;
  cxTL.fillStyle = '#4a4a7a'; cxTL.fillRect(ex, 0, 1, h);
  cxTL.fillStyle = '#252540'; cxTL.fillRect(0, h - 1, w, 1);
}

// ── Draw Chord Band ───────────────────────────────────────────────────────────
function drawChordBand() {
  const h = cvChord.height;
  cxChord.fillStyle = '#0d1f3a'; cxChord.fillRect(0, 0, cvChord.width, h);
  S.chords.forEach((ch, i) => {
    const x  = chordStartStep(i) * SW;
    const bw = ch.beats * SPB * SW;
    const hue = (i * 67) % 360;
    cxChord.fillStyle = `hsla(${hue},55%,30%,.95)`;
    cxChord.fillRect(x + 1, 1, bw - 2, h - 2);
    cxChord.fillStyle = '#fff'; cxChord.font = 'bold 11px monospace'; cxChord.textAlign = 'center';
    const lbl = NOTE_NAMES[ch.root] + (ch.type === 'maj' ? '' : ch.type);
    // Show beats count if narrow
    const label = bw > 60 ? `${lbl}  (${ch.beats}拍)` : lbl;
    cxChord.fillText(label, x + bw / 2, h / 2 + 4);
    cxChord.fillStyle = '#252540'; cxChord.fillRect(x + bw - 1, 0, 1, h);
  });
}

// ── Draw Roll ─────────────────────────────────────────────────────────────────
function drawRoll() {
  const w = cvRoll.width, h = cvRoll.height;
  const ts = totalSteps();
  const cx = cxRoll;

  // Background rows
  for (let row = 0; row < N_NOTES; row++) {
    const midi = rowMidi(row), y = row * NH, nm = NOTE_NAMES[midi % 12];
    cx.fillStyle = isBlack(midi) ? '#111122' : (nm === 'C' ? '#1c1c34' : '#171728');
    cx.fillRect(0, y, w, NH);
  }

  // Active chord highlight
  if (S.curStep >= 0) {
    const ci = chordIdxAt(S.curStep);
    cx.fillStyle = 'rgba(233,69,96,.05)';
    cx.fillRect(chordStartStep(ci) * SW, 0, S.chords[ci].beats * SPB * SW, h);
  }

  // Chord/scale tint per chord region
  S.chords.forEach((ch, ci) => {
    const def = CHORD_DEFS[ch.type];
    const sx  = chordStartStep(ci) * SW;
    const sw2 = ch.beats * SPB * SW;
    for (let row = 0; row < N_NOTES; row++) {
      const rel = ((rowMidi(row) - ch.root) % 12 + 12) % 12;
      if (def.iv.includes(rel))      { cx.fillStyle = 'rgba(233,69,96,.10)'; cx.fillRect(sx, row*NH, sw2, NH); }
      else if (def.sc.includes(rel)) { cx.fillStyle = 'rgba(0,200,255,.04)';  cx.fillRect(sx, row*NH, sw2, NH); }
    }
  });

  // Grid lines
  for (let s = 0; s <= ts; s++) {
    const x = s * SW;
    cx.fillStyle = isChordStart(s) ? '#5a5a8a' : (s % SPB === 0 ? '#252545' : '#1a1a32');
    cx.fillRect(x, 0, 1, h);
  }
  for (let row = 0; row <= N_NOTES; row++) {
    cx.fillStyle = '#1a1a32'; cx.fillRect(0, row * NH - 1, w, 1);
  }

  // Melody notes
  S.notes.forEach(n => {
    const row = midiRow(n.note);
    if (row < 0 || row >= N_NOTES) return;
    const x = n.step * SW + 1, y = row * NH + 1;
    const nw = n.dur * SW - 2, nh = NH - 2;
    const act = S.curStep >= n.step && S.curStep < n.step + n.dur;
    cx.fillStyle = act ? '#00ffff' : '#00c8f0';
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(x, y, nw, nh, 2); else cx.rect(x, y, nw, nh);
    cx.fill();
    if (nw > 18) {
      cx.fillStyle = '#003'; cx.font = 'bold 8px monospace'; cx.textAlign = 'left';
      cx.fillText(NOTE_NAMES[n.note % 12], x + 2, y + nh - 2);
    }
  });

  // Playhead
  if (S.curStep >= 0) {
    cx.fillStyle = 'rgba(233,69,96,.85)'; cx.fillRect(S.curStep * SW, 0, 2, h);
  }
}

// ── Resize ────────────────────────────────────────────────────────────────────
function resize() {
  const rs = document.getElementById('roll-scroll');
  const rw = rs.clientWidth, rh = rs.clientHeight;
  const cw = Math.max(totalSteps() * SW, rw);
  const ch = Math.max(N_NOTES * NH, rh);
  cvRoll.width = cw; cvRoll.height = ch;
  cvKeys.width = KW; cvKeys.height = ch;
  cvTL.width   = cw; cvTL.height   = 30;
  cvChord.width = cw; cvChord.height = 26;
  document.getElementById('keys-clip').style.height = rh + 'px';
  drawKeys(); drawTimeline(); drawChordBand(); drawRoll();
}

// ── Scroll sync ───────────────────────────────────────────────────────────────
document.getElementById('roll-scroll').addEventListener('scroll', e => {
  const sl = e.target.scrollLeft, st = e.target.scrollTop;
  cvTL.style.transform    = `translateX(-${sl}px)`;
  cvChord.style.transform = `translateX(-${sl}px)`;
  cvKeys.style.transform  = `translateY(-${st}px)`;
});

// ── Mouse interaction ─────────────────────────────────────────────────────────
let drawing = false, drawNote = null, drawStart = 0, erasing = false;

function posFromEvent(e) {
  const rs = document.getElementById('roll-scroll');
  const rect = cvRoll.getBoundingClientRect();
  const x = e.clientX - rect.left + rs.scrollLeft;
  const y = e.clientY - rect.top  + rs.scrollTop;
  return {
    step: Math.max(0, Math.min(Math.floor(x / SW), totalSteps() - 1)),
    midi: rowMidi(Math.max(0, Math.min(Math.floor(y / NH), N_NOTES - 1))),
  };
}
function noteAt(step, midi) {
  return S.notes.findIndex(n => n.note === midi && step >= n.step && step < n.step + n.dur);
}

cvRoll.addEventListener('mousedown', e => {
  e.preventDefault();
  const { step, midi } = posFromEvent(e);
  if (e.button === 2) {
    const idx = noteAt(step, midi);
    if (idx >= 0) { S.notes.splice(idx, 1); drawRoll(); updateStatus(); }
    erasing = true; drawing = true; return;
  }
  const idx = noteAt(step, midi);
  if (idx >= 0) { S.notes.splice(idx, 1); erasing = true; }
  else { drawNote = {step, note:midi, dur:1}; S.notes.push(drawNote); drawStart = step; erasing = false; }
  drawing = true; drawRoll(); updateStatus();
});
cvRoll.addEventListener('mousemove', e => {
  if (!drawing || erasing || !drawNote) return;
  drawNote.dur = Math.max(1, posFromEvent(e).step - drawStart + 1); drawRoll();
});
cvRoll.addEventListener('mouseup', () => { drawing = false; drawNote = null; updateStatus(); });
cvRoll.addEventListener('mouseleave', () => { drawing = false; drawNote = null; });
cvRoll.addEventListener('contextmenu', e => e.preventDefault());

// ── Chord Editor ──────────────────────────────────────────────────────────────
function buildChordEditor() {
  const list = document.getElementById('chord-list');
  list.innerHTML = '';
  S.chords.forEach((ch, i) => {
    const row = document.createElement('div');
    row.className = 'chord-row';

    const idx = document.createElement('span');
    idx.className = 'chord-idx'; idx.textContent = i + 1;

    const rootSel = document.createElement('select');
    rootSel.className = 'root-sel';
    NOTE_NAMES.forEach((n, ni) => {
      const o = document.createElement('option');
      o.value = ni; o.textContent = n; if (ni === ch.root) o.selected = true;
      rootSel.appendChild(o);
    });

    const typeSel = document.createElement('select');
    typeSel.className = 'type-sel';
    Object.entries(CHORD_DEFS).forEach(([k, v]) => {
      const o = document.createElement('option');
      o.value = k; o.textContent = v.label; if (k === ch.type) o.selected = true;
      typeSel.appendChild(o);
    });

    // 拍数セレクタ（1〜8拍、変拍子対応）
    const beatsSel = document.createElement('select');
    beatsSel.className = 'beats-sel';
    [1,2,3,4,5,6,7,8].forEach(b => {
      const o = document.createElement('option');
      o.value = b; o.textContent = b; if (b === ch.beats) o.selected = true;
      beatsSel.appendChild(o);
    });
    const beatsLbl = document.createElement('span');
    beatsLbl.className = 'beats-lbl'; beatsLbl.textContent = '拍';

    rootSel.addEventListener('change', () => { ch.root = +rootSel.value; refreshAll(); });
    typeSel.addEventListener('change', () => { ch.type = typeSel.value;  refreshAll(); });
    beatsSel.addEventListener('change', () => { ch.beats = +beatsSel.value; refreshAll(); });

    const del = document.createElement('button');
    del.className = 'del-btn'; del.textContent = '×';
    del.addEventListener('click', () => {
      if (S.chords.length > 1) { S.chords.splice(i, 1); buildChordEditor(); refreshAll(); }
    });

    // 拍数グループ（ラベル＋セレクタをまとめる）
    const beatsGrp = document.createElement('div');
    beatsGrp.className = 'beats-grp';
    beatsGrp.append(beatsLbl, beatsSel);

    // 1行にすべて並べる：番号・ルート・タイプ・[拍グループ]・削除
    row.append(idx, rootSel, typeSel, beatsGrp, del);
    list.appendChild(row);
  });
}

document.getElementById('btn-add').addEventListener('click', () => {
  if (S.chords.length < 16) {
    S.chords.push({root:0, type:'maj', beats:4});
    buildChordEditor(); refreshAll();
  }
});

// ── Key detection ─────────────────────────────────────────────────────────────
function detectKey() {
  const first = S.chords[0];
  const root  = first.root;
  const isMinor = ['min','min7','min6','dim'].includes(first.type);
  const intervals = isMinor ? [0,2,3,5,7,8,10] : [0,2,4,5,7,9,11];
  const notes = [];
  for (let m = 60; m <= 83; m++)
    if (intervals.includes(((m - root) % 12 + 12) % 12)) notes.push(m);
  return { root, isMinor, intervals, notes };
}

// ── Auto Melody ───────────────────────────────────────────────────────────────
// 拍数に応じてリズムパターンを動的生成
function makeRhythm(totalStepsInChord) {
  const rhythm = [];
  let rem = totalStepsInChord;
  while (rem > 0) {
    const opts = [2, 4, 6, 8].filter(d => d <= rem);
    if (!opts.length) { rhythm.push(rem); break; }
    rhythm.push(opts[Math.floor(Math.random() * opts.length)]);
    rem -= rhythm[rhythm.length - 1];
  }
  return rhythm;
}

function generateMelody() {
  S.notes = [];
  const key      = detectKey();
  const keyNotes = key.notes;

  S.chords.forEach((ch, ci) => {
    const def        = CHORD_DEFS[ch.type];
    const base       = chordStartStep(ci);
    const chordSteps = ch.beats * SPB;

    const ivNotes = keyNotes.filter(m => def.iv.includes(((m - ch.root) % 12 + 12) % 12));
    const landing = ivNotes.length ? ivNotes : keyNotes;
    if (!keyNotes.length) return;

    const rhy  = makeRhythm(chordSteps);
    let cur    = base;
    let prev   = landing[Math.floor(landing.length / 2)];

    rhy.forEach((dur, ni) => {
      if (cur >= base + chordSteps) return;
      const d = Math.min(dur, base + chordSteps - cur);
      if (d <= 0) return;
      const r = Math.random();
      const isLast = ni === rhy.length - 1 || cur + dur >= base + chordSteps;
      let next;
      if (isLast) {
        next = landing[Math.floor(Math.random() * landing.length)];
      } else if (r < 0.12) {
        next = prev;
      } else if (r < 0.55) {
        const idx = keyNotes.indexOf(prev);
        const dir = Math.random() < 0.55 ? 1 : -1;
        next = keyNotes[Math.max(0, Math.min(keyNotes.length-1, idx < 0 ? 0 : idx + dir))];
      } else if (r < 0.75) {
        next = landing[Math.floor(Math.random() * landing.length)];
      } else {
        const idx = keyNotes.indexOf(prev);
        const jmp = (Math.floor(Math.random()*3)+2) * (Math.random()<.5?1:-1);
        next = keyNotes[Math.max(0, Math.min(keyNotes.length-1, idx < 0 ? 0 : idx + jmp))];
      }
      S.notes.push({step:cur, note:next, dur:d});
      prev = next; cur += d;
    });
  });
  drawRoll(); updateStatus();
}

// ── WAV Export ────────────────────────────────────────────────────────────────
async function exportWAV() {
  const btn = document.getElementById('btn-wav');
  btn.textContent = '⏳ 処理中...'; btn.disabled = true;
  try {
    const sr  = 44100, sd = stepDur(), ts = totalSteps();
    const dur = ts * sd + 3.5;
    const off = new OfflineAudioContext(2, Math.ceil(sr * dur), sr);
    // コンプレッサー
    const comp = off.createDynamicsCompressor();
    comp.threshold.value = -8; comp.ratio.value = 4;
    comp.connect(off.destination);

    // コード（シンセパッド）
    S.chords.forEach((ch, ci) => {
      const t = chordStartStep(ci) * sd;
      const d = ch.beats * SPB * sd;
      playChordPad(off, comp, ch, t, d);
    });
    // メロディ
    S.notes.forEach(n => piano(off, comp, midi2f(n.note), n.step*sd, n.dur*sd, 0.16));

    const buf = await off.startRendering();
    downloadBlob(buf2wav(buf), 'chord_seq.wav', 'audio/wav');
  } finally { btn.textContent = '⬇ WAV'; btn.disabled = false; }
}

function buf2wav(buf) {
  const nc = buf.numberOfChannels, sr = buf.sampleRate, len = buf.length;
  const ab = new ArrayBuffer(44 + len * nc * 2);
  const v  = new DataView(ab);
  const W32 = (x,o) => v.setUint32(o,x,true);
  const W16 = (x,o) => v.setUint16(o,x,true);
  'RIFF'.split('').forEach((c,i) => v.setUint8(i, c.charCodeAt(0)));
  W32(ab.byteLength-8,4);
  'WAVE'.split('').forEach((c,i) => v.setUint8(8+i, c.charCodeAt(0)));
  'fmt '.split('').forEach((c,i) => v.setUint8(12+i, c.charCodeAt(0)));
  W32(16,16); W16(1,20); W16(nc,22); W32(sr,24);
  W32(sr*nc*2,28); W16(nc*2,32); W16(16,34);
  'data'.split('').forEach((c,i) => v.setUint8(36+i, c.charCodeAt(0)));
  W32(len*nc*2,40);
  let off = 44;
  for (let i=0;i<len;i++) for (let c=0;c<nc;c++) {
    const s = Math.max(-1, Math.min(1, buf.getChannelData(c)[i]));
    v.setInt16(off, s<0 ? s*0x8000 : s*0x7FFF, true); off+=2;
  }
  return ab;
}

// ── MIDI Export ───────────────────────────────────────────────────────────────
function exportMIDI() {
  const TPB  = 480, TPST = TPB / SPB;
  const tempo = Math.round(60000000 / S.bpm);
  const hdr = midiHdr(2, TPB);
  const t1  = midiChordTrack(TPST, tempo);
  const t2  = midiMelTrack(TPST);
  const out = new Uint8Array(hdr.length + t1.length + t2.length);
  out.set(hdr,0); out.set(t1,hdr.length); out.set(t2,hdr.length+t1.length);
  downloadBlob(out.buffer, 'chord_seq.mid', 'audio/midi');
}
function vl(v) {
  const b=[v&0x7f]; v>>=7;
  while(v){b.unshift((v&0x7f)|0x80);v>>=7;} return b;
}
function midiHdr(ntrk, tpb) {
  const b=new ArrayBuffer(14), v=new DataView(b);
  [0x4D,0x54,0x68,0x64].forEach((x,i)=>v.setUint8(i,x));
  v.setUint32(4,6); v.setUint16(8,1); v.setUint16(10,ntrk); v.setUint16(12,tpb);
  return new Uint8Array(b);
}
function buildTrack(evts) {
  const d=new Uint8Array(evts), b=new ArrayBuffer(8+d.length), v=new DataView(b);
  [0x4D,0x54,0x72,0x6B].forEach((x,i)=>v.setUint8(i,x));
  v.setUint32(4,d.length);
  const r=new Uint8Array(b); r.set(d,8); return r;
}
function midiChordTrack(tpst, tempo) {
  const evts=[];
  evts.push(...vl(0),0xFF,0x51,0x03,(tempo>>16)&0xFF,(tempo>>8)&0xFF,tempo&0xFF);
  const timed=[];
  S.chords.forEach((ch,ci) => {
    const def=CHORD_DEFS[ch.type];
    const st=chordStartStep(ci)*tpst, en=st+ch.beats*SPB*tpst-1;
    // Bass
    const bm=ch.root+36; timed.push({t:st,d:[0x90,bm,60]}); timed.push({t:en,d:[0x80,bm,0]});
    def.iv.forEach(iv=>{
      const m=ch.root+iv+48; timed.push({t:st,d:[0x90,m,75]}); timed.push({t:en,d:[0x80,m,0]});
    });
  });
  timed.sort((a,b)=>a.t-b.t);
  timed.push({t:totalSteps()*tpst, d:[0xFF,0x2F,0x00]});
  let cur=0; timed.forEach(e=>{evts.push(...vl(e.t-cur),...e.d);cur=e.t;});
  return buildTrack(evts);
}
function midiMelTrack(tpst) {
  const evts=[], timed=[];
  [...S.notes].sort((a,b)=>a.step-b.step).forEach(n=>{
    const st=n.step*tpst, en=st+n.dur*tpst-1;
    timed.push({t:st,d:[0x91,n.note,100]}); timed.push({t:en,d:[0x81,n.note,0]});
  });
  timed.sort((a,b)=>a.t-b.t);
  timed.push({t:totalSteps()*tpst, d:[0xFF,0x2F,0x00]});
  let cur=0; timed.forEach(e=>{evts.push(...vl(e.t-cur),...e.d);cur=e.t;});
  return buildTrack(evts);
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function downloadBlob(buf, name, mime) {
  const a = Object.assign(document.createElement('a'),
    {href: URL.createObjectURL(new Blob([buf],{type:mime})), download: name});
  a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function updateStatus() {
  const s = S.curStep;
  if (s >= 0) {
    const ci = chordIdxAt(s);
    const beatInChord = Math.floor((s - chordStartStep(ci)) / SPB) + 1;
    document.getElementById('s-pos').textContent = `コード${ci+1}  拍${beatInChord}`;
    const ch = S.chords[ci];
    document.getElementById('s-chord').textContent = NOTE_NAMES[ch.root] + CHORD_DEFS[ch.type].label;
  } else {
    document.getElementById('s-pos').textContent = '停止中';
    document.getElementById('s-chord').textContent = '—';
  }
  document.getElementById('s-notes').textContent = S.notes.length;
}

function refreshAll() {
  if (S.playing) stopPlay();
  const ts = totalSteps();
  S.notes = S.notes.filter(n => n.step < ts);
  resize(); updateStatus();
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click', startPlay);
document.getElementById('btn-stop').addEventListener('click', stopPlay);
document.getElementById('btn-loop').addEventListener('click', () => {
  S.loop = !S.loop; document.getElementById('btn-loop').classList.toggle('on', S.loop);
});
document.getElementById('inp-bpm').addEventListener('change', e => {
  S.bpm = Math.max(40, Math.min(240, +e.target.value));
});
document.getElementById('btn-gen').addEventListener('click', generateMelody);
document.getElementById('btn-clear').addEventListener('click', () => { S.notes=[]; drawRoll(); updateStatus(); });
document.getElementById('btn-quant').addEventListener('click', () => {
  S.notes = S.notes.map(n => ({...n, step:Math.round(n.step/2)*2, dur:Math.max(1,Math.round(n.dur/2)*2)}));
  drawRoll();
});
['btn-wav','btn-wav2'].forEach(id => document.getElementById(id).addEventListener('click', exportWAV));
['btn-midi','btn-midi2'].forEach(id => document.getElementById(id).addEventListener('click', exportMIDI));

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  buildChordEditor();
  new ResizeObserver(resize).observe(document.getElementById('roll-scroll'));
  resize();
  setTimeout(() => {
    const rs = document.getElementById('roll-scroll');
    rs.scrollTop = Math.max(0, N_NOTES * NH / 2 - rs.clientHeight / 2 + 60);
  }, 80);
  generateMelody(); updateStatus();
}
init();
</script>
